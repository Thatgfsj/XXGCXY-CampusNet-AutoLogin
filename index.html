<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园网助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 90%;
            max-width: 500px;
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .status-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .status-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .status-text {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        
        .status-detail {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
        }
        
        .connected {
            color: #10b981;
        }
        
        .disconnected {
            color: #ef4444;
        }
        
        .checking {
            color: #f59e0b;
        }
        
        .network-info {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .network-info h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #667eea;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #666;
        }
        
        .info-value {
            font-weight: bold;
            color: #333;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #e5e7eb;
            color: #374151;
        }
        
        .btn-secondary:hover {
            background: #d1d5db;
        }
        
        .setup-screen {
            display: none;
        }
        
        .wifi-list {
            max-height: 300px;
            overflow-y: auto;
            margin: 20px 0;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
        }
        
        .wifi-item {
            padding: 15px;
            border-bottom: 1px solid #e5e7eb;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .wifi-item:hover {
            background: #f8f9fa;
        }
        
        .wifi-item.selected {
            background: #e0e7ff;
            border-left: 4px solid #667eea;
        }
        
        .wifi-name {
            font-weight: bold;
            color: #333;
        }
        
        .wifi-signal {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn-group .btn {
            flex: 1;
        }
        
        .hidden {
            display: none !important;
        }
        
        .log-box {
            background: #1f2937;
            color: #10b981;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 20px;
        }
        
        .log-entry {
            margin-bottom: 5px;
        }
        
        .log-time {
            color: #6b7280;
        }
        
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .toggle-label {
            font-weight: bold;
            color: #333;
        }
        
        .toggle-switch {
            position: relative;
            width: 60px;
            height: 30px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 30px;
        }
        
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 24px;
            width: 24px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        
        input:checked + .toggle-slider {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        input:checked + .toggle-slider:before {
            transform: translateX(30px);
        }
        
        .interval-input {
            width: 80px;
            padding: 8px 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            font-weight: bold;
        }
        
        .interval-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e5e7eb;
        }
        
        .github-link {
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }
        
        .github-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- 主界面 -->
    <div class="container" id="mainScreen">
        <h1>🌐 校园网助手</h1>
        
        <div class="status-box">
            <div class="status-icon" id="statusIcon">⏳</div>
            <div class="status-text" id="statusText">正在检查网络...</div>
            <div class="status-detail" id="statusDetail"></div>
        </div>
        
        <div class="network-info" id="networkInfo">
            <h3>📡 网络信息</h3>
            <div class="info-row">
                <span class="info-label">当前WiFi:</span>
                <span class="info-value" id="currentWifi">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">配置的主网络:</span>
                <span class="info-value" id="primaryWifi">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">配置的备用网络:</span>
                <span class="info-value" id="backupWifi">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">检测间隔:</span>
                <span class="info-value"><span id="intervalDisplay">15</span>秒</span>
            </div>
            <div class="info-row">
                <span class="info-label">测试地址:</span>
                <span class="info-value">baidu.com, qq.com</span>
            </div>
        </div>
        
        <button class="btn btn-primary" id="checkNowBtn" onclick="checkNow()">
            🔄 立即检测网络
        </button>
        
        <div class="toggle-container">
            <span class="toggle-label">🔔 自动检测网络</span>
            <label class="toggle-switch">
                <input type="checkbox" id="autoCheckToggle" onchange="toggleAutoCheck()" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>
        
        <div class="toggle-container">
            <span class="toggle-label">🚀 开机自启动</span>
            <label class="toggle-switch">
                <input type="checkbox" id="autostartToggle" onchange="toggleAutostart()">
                <span class="toggle-slider"></span>
            </label>
        </div>
        
        <button class="btn btn-secondary" onclick="showSetup()">
            ⚙️ 网络配置
        </button>
        
        <div class="log-box" id="logBox">
        </div>
        
        <div class="footer">
            <a href="#" onclick="openGithub()" class="github-link">
                🔗 GitHub: XXGCXY-CampusNet-AutoLogin
            </a>
        </div>
    </div>
    
    <!-- 配置界面 -->
    <div class="container hidden" id="setupScreen">
        <h1>⚙️ 网络配置</h1>
        
        <p style="margin-bottom: 15px; color: #666;">请选择您要连接的主网络和备用网络：</p>
        
        <div class="wifi-list" id="wifiList">
            <div style="padding: 20px; text-align: center; color: #666;">
                正在扫描WiFi...
            </div>
        </div>
        
        <div class="info-row" style="margin-top: 20px;">
            <span class="info-label">已选主网络:</span>
            <span class="info-value" id="selectedPrimary">未选择</span>
        </div>
        <div class="info-row">
            <span class="info-label">已选备用网络:</span>
            <span class="info-value" id="selectedBackup">未选择</span>
        </div>
        
        <div class="info-row" style="margin-top: 15px;">
            <span class="info-label">检测间隔(秒):</span>
            <input type="number" class="interval-input" id="intervalInput" min="5" max="300" value="15">
        </div>
        
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="showMain()">返回</button>
            <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
        </div>
    </div>

    <script type="module">
        import { invoke } from '@tauri-apps/api/core';
        
        let config = {
            primary_ssid: '',
            backup_ssid: '',
            check_interval: 15,
            test_hosts: ['baidu.com', 'qq.com']
        };
        
        let wifiNetworks = [];
        let selectedPrimary = '';
        let selectedBackup = '';
        let autoCheckEnabled = true;
        let checkIntervalId = null;
        let isLoggingIn = false;  // 防止重复登录
        let lastLoginTime = 0;    // 上次登录时间
        
        // 初始化
        window.onload = async () => {
            addLog('程序已启动');
            await loadConfig();
            // 从后端获取检测开关状态
            try {
                autoCheckEnabled = await invoke('get_check_enabled');
                document.getElementById('autoCheckToggle').checked = autoCheckEnabled;
            } catch (e) {
                console.log('获取检测开关状态失败');
            }
            // 获取开机自启动状态
            try {
                const autostartEnabled = await invoke('get_autostart_enabled');
                document.getElementById('autostartToggle').checked = autostartEnabled;
            } catch (e) {
                console.log('获取自启动状态失败');
            }
            await checkNetwork();
            
            // 启动定时检测
            startCheckInterval();
        };
        
        // 启动定时检测
        function startCheckInterval() {
            if (checkIntervalId) {
                clearInterval(checkIntervalId);
            }
            checkIntervalId = setInterval(async () => {
                if (autoCheckEnabled) {
                    await checkNetwork();
                }
            }, config.check_interval * 1000);
        }
        
        // 切换自动检测
        async function toggleAutoCheck() {
            try {
                autoCheckEnabled = await invoke('toggle_check_enabled');
                addLog(autoCheckEnabled ? '已开启自动检测' : '已关闭自动检测');
            } catch (e) {
                addLog('切换检测开关失败: ' + e);
            }
        }
        window.toggleAutoCheck = toggleAutoCheck;
        
        // 切换开机自启动
        async function toggleAutostart() {
            try {
                const enabled = document.getElementById('autostartToggle').checked;
                await invoke('set_autostart_enabled', { enabled: enabled });
                addLog(enabled ? '已开启开机自启动' : '已关闭开机自启动');
            } catch (e) {
                addLog('设置自启动失败: ' + e);
                // 恢复开关状态
                document.getElementById('autostartToggle').checked = !document.getElementById('autostartToggle').checked;
            }
        }
        window.toggleAutostart = toggleAutostart;
        
        // 加载配置
        async function loadConfig() {
            try {
                const result = await invoke('load_config');
                if (result) {
                    config = result;
                    selectedPrimary = config.primary_ssid || '';
                    selectedBackup = config.backup_ssid || '';
                    updateNetworkInfo();
                    // 更新配置界面的已选网络显示
                    document.getElementById('selectedPrimary').textContent = selectedPrimary || '未选择';
                    document.getElementById('selectedBackup').textContent = selectedBackup || '未选择';
                }
            } catch (e) {
                console.log('加载配置失败，使用默认配置');
            }
        }
        
        // 更新网络信息显示
        function updateNetworkInfo() {
            document.getElementById('primaryWifi').textContent = config.primary_ssid || '未设置';
            document.getElementById('backupWifi').textContent = config.backup_ssid || '未设置';
            document.getElementById('intervalDisplay').textContent = config.check_interval;
            document.getElementById('intervalInput').value = config.check_interval;
        }
        
        // 检测网络状态
        async function checkNetwork() {
            // 如果正在登录，跳过检测
            if (isLoggingIn) {
                return;
            }
            
            try {
                const status = await invoke('check_network');
                updateStatus(status);
                
                // 如果网络正常，重置登录状态
                if (status.internet_ok) {
                    isLoggingIn = false;
                    return;
                }
                
                if (status.needs_reconnect) {
                    addLog('检测到断网，开始重连...');
                    await reconnectWifi();
                    return;
                }
                
                if (status.needs_login) {
                    // 检查是否刚登录过（10秒内）
                    const now = Date.now();
                    if (now - lastLoginTime < 10000) {
                        console.log('刚登录过，跳过重复登录');
                        return;
                    }
                    addLog('需要登录校园网，正在执行登录...');
                    await runLoginScript();
                }
            } catch (e) {
                addLog('检测网络失败: ' + e);
            }
        }
        
        // 更新状态显示
        function updateStatus(status) {
            const icon = document.getElementById('statusIcon');
            const text = document.getElementById('statusText');
            const detail = document.getElementById('statusDetail');
            const currentWifi = document.getElementById('currentWifi');
            
            currentWifi.textContent = status.wifi_connected || '未连接';
            
            if (status.internet_ok) {
                icon.textContent = '✅';
                text.textContent = '网络正常';
                text.className = 'status-text connected';
                detail.textContent = '已连接互联网';
            } else if (status.wifi_connected) {
                icon.textContent = '🔐';
                text.textContent = '需要登录';
                text.className = 'status-text disconnected';
                detail.textContent = 'WiFi已连接，需要校园网认证';
            } else {
                icon.textContent = '❌';
                text.textContent = '网络断开';
                text.className = 'status-text disconnected';
                detail.textContent = 'WiFi未连接';
            }
        }
        
        // 重新连接WiFi
        async function reconnectWifi() {
            let connectedSsid = null;
            
            // 尝试连接主网络
            if (config.primary_ssid) {
                addLog('正在连接主网络: ' + config.primary_ssid);
                try {
                    await invoke('connect_wifi', { ssid: config.primary_ssid });
                    await sleep(4000);  // 等待连接完成
                    
                    // 检查是否真的连接上了
                    const status = await invoke('check_network');
                    if (status.wifi_connected === config.primary_ssid) {
                        addLog('已连接到: ' + config.primary_ssid);
                        connectedSsid = config.primary_ssid;
                    }
                } catch (e) {
                    addLog('连接主网络失败: ' + e);
                }
            } else {
                addLog('未配置主网络');
            }
            
            // 如果主网络没连上，尝试备用网络
            if (!connectedSsid && config.backup_ssid) {
                addLog('尝试备用网络: ' + config.backup_ssid);
                try {
                    await invoke('connect_wifi', { ssid: config.backup_ssid });
                    await sleep(4000);
                    
                    const status = await invoke('check_network');
                    if (status.wifi_connected === config.backup_ssid) {
                        addLog('已连接到: ' + config.backup_ssid);
                        connectedSsid = config.backup_ssid;
                    }
                } catch (e) {
                    addLog('连接备用网络失败: ' + e);
                }
            }
            
            // 只有确认WiFi连接成功后，才尝试登录
            if (connectedSsid) {
                addLog('WiFi已连接，检查网络状态...');
                const status = await invoke('check_network');
                if (status.needs_login) {
                    addLog('需要登录校园网，正在执行登录...');
                    await runLoginScript();
                } else if (status.internet_ok) {
                    addLog('网络正常，无需登录');
                }
            } else {
                addLog('WiFi连接失败，请检查网络设置');
            }
        }
        
        // 运行登录脚本
        async function runLoginScript() {
            // 防止重复登录
            if (isLoggingIn) {
                console.log('已在登录中，跳过');
                return;
            }
            
            isLoggingIn = true;
            lastLoginTime = Date.now();
            
            try {
                addLog('正在执行登录脚本...');
                const result = await invoke('run_login_script');
                addLog(result);
                await sleep(3000);  // 等待网络生效
                
                // 登录后重新检测
                const status = await invoke('check_network');
                updateStatus(status);
                if (status.internet_ok) {
                    addLog('网络已恢复正常');
                } else {
                    addLog('登录后仍无法上网，请检查账号密码');
                }
            } catch (e) {
                addLog('登录失败: ' + e);
            } finally {
                // 延迟重置登录状态，防止立即重试
                setTimeout(() => {
                    isLoggingIn = false;
                }, 5000);
            }
        }
        
        // 立即检测
        async function checkNow() {
            addLog('正在检测网络...');
            // 先快速更新状态
            document.getElementById('statusIcon').textContent = '⏳';
            document.getElementById('statusText').textContent = '检测中...';
            await checkNetwork();
        }
        window.checkNow = checkNow;
        
        // 显示配置界面
        async function showSetup() {
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('setupScreen').classList.remove('hidden');
            
            // 扫描WiFi
            await scanWifi();
        }
        window.showSetup = showSetup;
        
        // 显示主界面
        function showMain() {
            document.getElementById('setupScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.remove('hidden');
        }
        window.showMain = showMain;
        
        // 扫描WiFi
        async function scanWifi() {
            try {
                const networks = await invoke('scan_wifi');
                wifiNetworks = networks;
                renderWifiList();
            } catch (e) {
                if (e === 'WIFI_PERMISSION_DENIED') {
                    addLog('扫描WiFi失败: 需要管理员权限或开启位置服务');
                    document.getElementById('wifiList').innerHTML =
                        '<div style="padding: 20px; text-align: center; color: #f59e0b;">' +
                        '<div style="font-size: 32px; margin-bottom: 10px;">⚠️</div>' +
                        '<div style="font-weight: bold; margin-bottom: 10px;">需要权限</div>' +
                        '<div style="font-size: 13px; color: #666; line-height: 1.5;">' +
                        'WiFi扫描需要管理员权限或开启位置服务<br>' +
                        '请右键选择"以管理员身份运行"<br>' +
                        '或前往"设置 > 隐私与安全 > 位置"开启位置服务' +
                        '</div>' +
                        '</div>';
                } else {
                    addLog('扫描WiFi失败: ' + e);
                    document.getElementById('wifiList').innerHTML =
                        '<div style="padding: 20px; text-align: center; color: #666;">扫描失败，请重试</div>';
                }
            }
        }
        
        // 渲染WiFi列表
        function renderWifiList() {
            const list = document.getElementById('wifiList');
            
            if (wifiNetworks.length === 0) {
                list.innerHTML = '<div style="padding: 20px; text-align: center; color: #666;">未找到WiFi网络</div>';
                return;
            }
            
            let html = '';
            wifiNetworks.forEach((wifi, index) => {
                const isPrimary = selectedPrimary === wifi.ssid;
                const isBackup = selectedBackup === wifi.ssid;
                const selectedClass = isPrimary || isBackup ? 'selected' : '';
                
                html += `
                    <div class="wifi-item ${selectedClass}" onclick="selectWifi(${index})">
                        <div class="wifi-name">${wifi.ssid} ${isPrimary ? '(主网络)' : ''} ${isBackup ? '(备用)' : ''}</div>
                        <div class="wifi-signal">信号强度: ${wifi.signal}%</div>
                    </div>
                `;
            });
            
            list.innerHTML = html;
        }
        
        // 选择WiFi
        function selectWifi(index) {
            const wifi = wifiNetworks[index];
            
            if (!selectedPrimary) {
                selectedPrimary = wifi.ssid;
            } else if (!selectedBackup && wifi.ssid !== selectedPrimary) {
                selectedBackup = wifi.ssid;
            } else if (wifi.ssid === selectedPrimary) {
                selectedPrimary = '';
            } else if (wifi.ssid === selectedBackup) {
                selectedBackup = '';
            } else {
                // 替换主网络
                selectedBackup = selectedPrimary;
                selectedPrimary = wifi.ssid;
            }
            
            document.getElementById('selectedPrimary').textContent = selectedPrimary || '未选择';
            document.getElementById('selectedBackup').textContent = selectedBackup || '未选择';
            
            renderWifiList();
        }
        window.selectWifi = selectWifi;
        
        // 保存配置
        async function saveConfig() {
            if (!selectedPrimary) {
                alert('请至少选择一个主网络');
                return;
            }
            
            // 获取检测间隔
            let interval = parseInt(document.getElementById('intervalInput').value);
            if (interval < 5) interval = 5;
            if (interval > 300) interval = 300;
            
            config.primary_ssid = selectedPrimary;
            config.backup_ssid = selectedBackup;
            config.check_interval = interval;
            
            try {
                await invoke('save_config', { config: config });
                addLog('配置已保存');
                updateNetworkInfo();
                showMain();
                // 重新启动定时器
                startCheckInterval();
            } catch (e) {
                alert('保存配置失败: ' + e);
            }
        }
        window.saveConfig = saveConfig;
        
        // 添加日志
        function addLog(message) {
            const logBox = document.getElementById('logBox');
            const now = new Date();
            const time = now.toTimeString().split(' ')[0];
            
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${time}]</span> ${message}`;
            
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
            
            // 保留最近50条日志
            while (logBox.children.length > 50) {
                logBox.removeChild(logBox.firstChild);
            }
        }
        
        // 睡眠函数
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        // 打开 GitHub
        async function openGithub() {
            try {
                await invoke('open_github');
            } catch (e) {
                console.log('打开链接失败:', e);
            }
            return false;
        }
        window.openGithub = openGithub;
    </script>
</body>
</html>
