name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend deps
        run: npm ci
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev pkg-config libssl-dev libdbus-1-dev libappindicator3-dev
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Build Tauri (Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'xxgcxy-wifi ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false
          args: --bundles deb

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend deps
        run: npm ci
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Download PowerShell 7 portable
        shell: pwsh
        run: |
          $pw7Dir = "${{ github.workspace }}\src-tauri\bin\_pw7_"
          New-Item -ItemType Directory -Path $pw7Dir -Force | Out-Null
          $zipPath = "$pw7Dir\pwsh.zip"
          $url = "https://github.com/PowerShell/PowerShell/releases/download/v7.4.4/PowerShell-7.4.4-win-x64.zip"
          Write-Host "Downloading PowerShell 7..."
          Invoke-WebRequest -Uri $url -OutFile $zipPath
          Write-Host "Extracting PowerShell 7..."
          Expand-Archive -Path $zipPath -DestinationPath $pw7Dir -Force
          # Move contents up one level so pwsh.exe is at _pw7_/pwsh.exe
          Get-ChildItem -Path "$pw7Dir\PowerShell-7.4.4-win-x64" | Move-Item -Destination $pw7Dir -Force
          Remove-Item "$pw7Dir\PowerShell-7.4.4-win-x64" -Recurse -Force
          Remove-Item $zipPath -Force
          Write-Host "PowerShell 7 installed to $pw7Dir"
          Get-ChildItem $pw7Dir
      - name: Build Tauri (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'xxgcxy-wifi ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false
          args: --bundles nsis,msi
