name: Build Release

on:
  push:
    branches:
      - win-portable
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build with Tauri CLI
        run: npx @tauri-apps/cli build

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: npm ci

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev pkg-config libssl-dev libdbus-1-dev libappindicator3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build with Tauri CLI
        run: npx @tauri-apps/cli build

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: src-tauri/target/release/bundle/deb/*.deb

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-build

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.4.${{ github.run_number }}-win-portable
          name: v1.4.${{ github.run_number }} Win-Portable (内置PS7)
          body: |
            ## Windows 便携版 (内置 PowerShell 7)

            **本版本内置 PowerShell 7.6.0 便携版，开箱即用，无需额外安装。**

            ### 下载文件

            **Windows:**
            - `xxgcxy-wifi_x.x.x_x64-setup.exe` - 安装包
            - `xxgcxy-wifi_x.x.x_x64.msi` - MSI 安装包

            **Linux:**
            - `xxgcxy-wifi_x.x.x_amd64.deb` - DEB 安装包

            ### 内置 PowerShell 7 许可声明

            ⚠️ 本版本内置的 PowerShell 7 便携版遵循 MIT 开源协议

            - 来源: https://github.com/PowerShell/PowerShell
            - 许可证: MIT License

            ---
            MIT License | 作者: Thatgfsj
          files: |
            *.exe
            *.msi
            *.deb
