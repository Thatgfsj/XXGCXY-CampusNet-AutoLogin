name: Build All Platforms Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ============================================
  # Windows + 内置 PS7 (包含 _pw7_ 目录)
  # ============================================
  build-win-portable:
    runs-on: windows-latest
    steps:
      - name: Checkout win-portable branch (LFS smudges _pw7_ binaries)
        uses: actions/checkout@v4
        with:
          ref: win-portable
          lfs: true

      - name: Sync non-_pw7_ files from main, restore _pw7_ from LFS checkout
        shell: pwsh
        run: |
          # Save _pw7_ (binaries from LFS-smudged win-portable checkout)
          Move-Item src-tauri/bin/_pw7_ ../_pw7_backup -Force
          # Fetch main and overwrite working tree with main's files
          git fetch origin main --depth=1
          git checkout origin/main -- .
          # Remove any _pw7_ that came from main (doesn't have it)
          Remove-Item src-tauri/bin/_pw7_ -Recurse -Force -ErrorAction SilentlyContinue
          # Restore real _pw7_ binaries from LFS checkout
          Move-Item ../_pw7_backup src-tauri/bin/_pw7_
          # Verify real binaries
          $pwsh = Get-Item src-tauri/bin/_pw7_/pwsh.exe -ErrorAction SilentlyContinue
          Write-Host "pwsh.exe size: $($pwsh.Length) bytes"
          $totalSize = (Get-ChildItem -Recurse src-tauri/bin/_pw7_/ | Measure-Object -Property Length -Sum).Sum
          Write-Host "_pw7_ total size: $([math]::Round($totalSize / 1MB, 2)) MB"

      - name: Add _pw7_ to tauri.conf.json (text replace)
        shell: pwsh
        run: |
          $confPath = Join-Path $env:GITHUB_WORKSPACE "src-tauri/tauri.conf.json"
          $content = Get-Content $confPath -Raw -Encoding UTF8
          # Exact text replacement - add _pw7_ after WebView2Loader.dll
          $content = $content.Replace('"bin/WebView2Loader.dll"', '"bin/WebView2Loader.dll", "bin/_pw7_/**"')
          # Write as UTF8 without BOM
          [System.IO.File]::WriteAllText($confPath, $content, [System.Text.UTF8Encoding]::new($false))
          # Verify
          $check = Get-Content $confPath -Raw -Encoding UTF8
          if ($check -match '_pw7_') { Write-Host "SUCCESS: _pw7_ in resources" } else { Write-Host "FAIL: _pw7_ missing!" }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Verify _pw7_ + config before build
        shell: pwsh
        run: |
          $pwd = Get-Location
          Write-Host "Working dir: $pwd"
          Write-Host "Does _pw7_ exist?: $(Test-Path src-tauri/bin/_pw7_)"
          Write-Host "Does pwsh.exe exist?: $(Test-Path src-tauri/bin/_pw7_/pwsh.exe)"
          Write-Host "bin/_pw7_ contents: $(Get-ChildItem src-tauri/bin/_pw7_/ | Select-Object -First 3 | ForEach-Object { $_.Name })"
          Write-Host ""
          Write-Host "=== RESOURCES in tauri.conf.json ==="
          $raw = Get-Content "src-tauri/tauri.conf.json" -Raw -Encoding UTF8
          $match = [regex]::Match($raw, '"resources".*?\[.*?\]')
          if ($match.Success) { Write-Host $match.Value } else { Write-Host "NOT FOUND" }
          Write-Host ""
          Write-Host "File contains _pw7_: $($raw.Contains('_pw7_'))"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri
        run: npx @tauri-apps/cli build

      - name: Upload NSIS
        uses: actions/upload-artifact@v4
        with:
          name: win-portable-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: win-portable-msi
          path: src-tauri/target/release/bundle/msi/*.msi

  # ============================================
  # Windows + 系统 PS7 (移除 _pw7_ 目录)
  # ============================================
  build-win-system:
    runs-on: windows-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Remove _pw7_ directory (system PS7 mode)
        shell: pwsh
        run: |
          $pw7Paths = @(
            ".\_pw7_",
            ".\src-tauri\bin\_pw7_"
          )
          foreach ($p in $pw7Paths) {
            if (Test-Path $p) {
              Remove-Item -Recurse -Force $p
              Write-Host "Removed: $p"
            }
          }

      - name: Build Tauri
        run: npx @tauri-apps/cli build

      - name: Upload NSIS
        uses: actions/upload-artifact@v4
        with:
          name: win-system-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: win-system-msi
          path: src-tauri/target/release/bundle/msi/*.msi

  # ============================================
  # Linux: deb + tar.gz + rpm
  # ============================================
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (WebKit + rpm)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            alien \
            rpm \
            fakeroot

      - name: Build Tauri
        run: npx @tauri-apps/cli build

      - name: Create Linux packages
        run: |
          APP_VERSION="1.7.11"
          mkdir -p release/linux

          # Copy deb package
          cp src-tauri/target/release/bundle/deb/*.deb release/linux/

          # Create tar.gz package
          BINARY_NAME="xxgcxy-wifi"
          TAR_DIR="xxgcxy-wifi-v${APP_VERSION}-linux-x64"
          mkdir -p "release/linux/${TAR_DIR}"

          # Copy binary and scripts
          if [ -f "src-tauri/target/release/${BINARY_NAME}" ]; then
            cp "src-tauri/target/release/${BINARY_NAME}" "release/linux/${TAR_DIR}/"
          fi
          # Copy shell script
          cp xywdl.sh "release/linux/${TAR_DIR}/"
          chmod +x "release/linux/${TAR_DIR}/xywdl.sh"

          # Create tar.gz
          cd release/linux
          tar -czf "xxgcxy-wifi-v${APP_VERSION}-x86_64-linux.tar.gz" "${TAR_DIR}/"
          rm -rf "${TAR_DIR}"
          cd ../..

          # Convert deb to rpm (needs alien)
          cd src-tauri/target/release/bundle/deb/
          DEB_FILE=$(ls *.deb | head -1)
          if [ -n "$DEB_FILE" ]; then
            fakeroot alien --to-rpm --keep-version "$DEB_FILE" 2>/dev/null || \
            alien --to-rpm --keep-version "$DEB_FILE" 2>/dev/null || \
            echo "rpm conversion failed (skipping)"
          fi
          cd ../../../../..

          # Copy rpm package (if generated successfully)
          if ls src-tauri/target/release/bundle/deb/*.rpm 1>/dev/null 2>&1; then
            cp src-tauri/target/release/bundle/deb/*.rpm release/linux/
          fi

      - name: Upload Linux deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release/linux/*.deb

      - name: Upload Linux tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: linux-tar-gz
          path: release/linux/*.tar.gz

      - name: Upload Linux rpm
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: release/linux/*.rpm

  # ============================================
  # 发布独立 sh 脚本
  # ============================================
  build-standalone-sh:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Package standalone sh script
        run: |
          mkdir -p release/standalone-sh
          cp xywdl.sh release/standalone-sh/
          chmod +x release/standalone-sh/xywdl.sh

      - name: Upload standalone sh
        uses: actions/upload-artifact@v4
        with:
          name: standalone-sh
          path: release/standalone-sh/xywdl.sh

  # ============================================
  # 创建统一 Release
  # ============================================
  release:
    needs: [build-win-portable, build-win-system, build-linux, build-standalone-sh]
    runs-on: ubuntu-latest
    steps:
      - name: Download win-portable NSIS
        uses: actions/download-artifact@v4
        with:
          name: win-portable-nsis
          path: artifacts/win-portable

      - name: Download win-portable MSI
        uses: actions/download-artifact@v4
        with:
          name: win-portable-msi
          path: artifacts/win-portable

      - name: Download win-system NSIS
        uses: actions/download-artifact@v4
        with:
          name: win-system-nsis
          path: artifacts/win-system

      - name: Download win-system MSI
        uses: actions/download-artifact@v4
        with:
          name: win-system-msi
          path: artifacts/win-system

      - name: Download Linux deb
        uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: artifacts/linux

      - name: Download Linux tar.gz
        uses: actions/download-artifact@v4
        with:
          name: linux-tar-gz
          path: artifacts/linux

      - name: Download Linux rpm
        uses: actions/download-artifact@v4
        with:
          name: linux-rpm
          path: artifacts/linux

      - name: Download standalone sh
        uses: actions/download-artifact@v4
        with:
          name: standalone-sh
          path: artifacts/standalone-sh

      - name: Rename win-system artifacts
        run: |
          cd artifacts/win-system
          for f in *.exe; do mv "$f" "${f%.exe}_no-ps7.exe"; done
          for f in *.msi; do mv "$f" "${f%.msi}_no-ps7.msi"; done

      - name: List artifacts
        run: |
          echo "=== Artifacts ==="
          find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.7.11
          name: v1.7.11 - xiaoyuanwangluo zidong denglu zhushou
          body: |
            v1.7.11 - xiaoyuanwangluo zidong denglu zhushou

            ## Download

            **Windows (Built-in PS7, no manual PS7 install needed)**
            - `xxgcxy-wifi_1.7.11_x64-setup.exe` - NSIS installer
            - `xxgcxy-wifi_1.7.11_x64_zh-CN.msi` - MSI installer

            **Windows (System PS7 required)**
            - `xxgcxy-wifi_1.7.11_x64-setup_no-ps7.exe` - NSIS installer
            - `xxgcxy-wifi_1.7.11_x64_zh-CN_no-ps7.msi` - MSI installer

            **Linux**
            - `xxgcxy-wifi_1.7.11_amd64.deb` - Debian/Ubuntu package
            - `xxgcxy-wifi-v1.7.11-x86_64-linux.tar.gz` - Generic Linux tarball
            - `xxgcxy-wifi-1.7.11-1.x86_64.rpm` - RPM package (converted from deb)

            **Cross-platform**
            - `xywdl.sh` - Standalone shell script (Linux/macOS, needs pwsh)

            ## Changelog v1.7.11
            - Fix: Anti-proxy interference - all HTTP requests bypass system proxy
            - Fix: Auto-reconnect logic - 3 retries + revalidate after reconnect
            - Fix: Auto-retry login on failure
            - New: Tray menu "Manual Link" option
            - Optimize: Login script supports --non-interactive flag
            - New: Linux TAR.GZ and RPM packages
          files: |
            artifacts/win-portable/*.exe
            artifacts/win-portable/*.msi
            artifacts/win-system/*.exe
            artifacts/win-system/*.msi
            artifacts/linux/*.deb
            artifacts/linux/*.tar.gz
            artifacts/linux/*.rpm
            artifacts/standalone-sh/*.sh
