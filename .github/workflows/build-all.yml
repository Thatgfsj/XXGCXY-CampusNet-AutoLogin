name: Build All Platforms Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ============================================
  # Windows + 内置 PS7 (包含 _pw7_ 目录)
  # ============================================
  build-win-portable:
    runs-on: windows-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          lfs: true
          fetch-depth: 0

      - name: Fetch _pw7_ from win-portable branch
        shell: pwsh
        run: |
          git fetch origin win-portable --depth=1
          git checkout origin/win-portable -- src-tauri/bin/_pw7_/
          Write-Host "_pw7_ 目录已从 win-portable 分支获取，文件数：$( (Get-ChildItem -Recurse src-tauri/bin/_pw7_).Count )"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri
        run: npx @tauri-apps/cli build

      - name: Upload NSIS
        uses: actions/upload-artifact@v4
        with:
          name: win-portable-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: win-portable-msi
          path: src-tauri/target/release/bundle/msi/*.msi

  # ============================================
  # Windows + 系统 PS7 (移除 _pw7_ 目录)
  # ============================================
  build-win-system:
    runs-on: windows-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Remove _pw7_ directory (system PS7 mode)
        shell: pwsh
        run: |
          # Tauri resources 中移除 _pw7_ 便携版 PowerShell
          # 通过删除 _pw7_ 目录来让 xywdl.bat 回退到系统 PS7
          $pw7Paths = @(
            ".\_pw7_",
            ".\src-tauri\bin\_pw7_"
          )
          foreach ($p in $pw7Paths) {
            if (Test-Path $p) {
              Remove-Item -Recurse -Force $p
              Write-Host "已删除: $p"
            }
          }

      - name: Build Tauri
        run: npx @tauri-apps/cli build

      - name: Upload NSIS
        uses: actions/upload-artifact@v4
        with:
          name: win-system-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: win-system-msi
          path: src-tauri/target/release/bundle/msi/*.msi

  # ============================================
  # Linux: deb + tar.gz + rpm
  # ============================================
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (WebKit + rpm)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            alien \
            rpm \
            fakeroot

      - name: Build Tauri
        run: npx @tauri-apps/cli build

      - name: Create Linux packages
        run: |
          APP_VERSION="1.7.11"
          mkdir -p release/linux

          # 复制 deb 包
          cp src-tauri/target/release/bundle/deb/*.deb release/linux/

          # 创建 tar.gz 包
          BINARY_NAME="xxgcxy-wifi"
          TAR_DIR="xxgcxy-wifi-v${APP_VERSION}-linux-x64"
          mkdir -p "release/linux/${TAR_DIR}"

          # 复制二进制及资源文件
          if [ -f "src-tauri/target/release/${BINARY_NAME}" ]; then
            cp "src-tauri/target/release/${BINARY_NAME}" "release/linux/${TAR_DIR}/"
          fi
          # 复制 shell 脚本
          cp xywdl.sh "release/linux/${TAR_DIR}/"
          chmod +x "release/linux/${TAR_DIR}/xywdl.sh"

          # 创建 tar.gz
          cd release/linux
          tar -czf "xxgcxy-wifi-v${APP_VERSION}-x86_64-linux.tar.gz" "${TAR_DIR}/"
          rm -rf "${TAR_DIR}"
          cd ../..

          # 将 deb 转换为 rpm (需要 alien)
          cd src-tauri/target/release/bundle/deb/
          DEB_FILE=$(ls *.deb | head -1)
          if [ -n "$DEB_FILE" ]; then
            fakeroot alien --to-rpm --keep-version "$DEB_FILE" 2>/dev/null || \
            alien --to-rpm --keep-version "$DEB_FILE" 2>/dev/null || \
            echo "rpm 转换失败（跳过）" 
          fi
          cd ../../../../..

          # 复制 rpm 包（如果生成成功）
          if ls src-tauri/target/release/bundle/deb/*.rpm 1>/dev/null 2>&1; then
            cp src-tauri/target/release/bundle/deb/*.rpm release/linux/
          fi

      - name: Upload Linux deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release/linux/*.deb

      - name: Upload Linux tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: linux-tar-gz
          path: release/linux/*.tar.gz

      - name: Upload Linux rpm
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: release/linux/*.rpm

  # ============================================
  # 发布独立 sh 脚本
  # ============================================
  build-standalone-sh:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Package standalone sh script
        run: |
          mkdir -p release/standalone-sh
          cp xywdl.sh release/standalone-sh/
          chmod +x release/standalone-sh/xywdl.sh

      - name: Upload standalone sh
        uses: actions/upload-artifact@v4
        with:
          name: standalone-sh
          path: release/standalone-sh/xywdl.sh

  # ============================================
  # 创建统一 Release
  # ============================================
  release:
    needs: [build-win-portable, build-win-system, build-linux, build-standalone-sh]
    runs-on: ubuntu-latest
    steps:
      - name: Download win-portable NSIS
        uses: actions/download-artifact@v4
        with:
          name: win-portable-nsis
          path: artifacts/win-portable

      - name: Download win-portable MSI
        uses: actions/download-artifact@v4
        with:
          name: win-portable-msi
          path: artifacts/win-portable

      - name: Download win-system NSIS
        uses: actions/download-artifact@v4
        with:
          name: win-system-nsis
          path: artifacts/win-system

      - name: Download win-system MSI
        uses: actions/download-artifact@v4
        with:
          name: win-system-msi
          path: artifacts/win-system

      - name: Download Linux deb
        uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: artifacts/linux

      - name: Download Linux tar.gz
        uses: actions/download-artifact@v4
        with:
          name: linux-tar-gz
          path: artifacts/linux

      - name: Download Linux rpm
        uses: actions/download-artifact@v4
        with:
          name: linux-rpm
          path: artifacts/linux

      - name: Download standalone sh
        uses: actions/download-artifact@v4
        with:
          name: standalone-sh
          path: artifacts/standalone-sh

      - name: Rename win-system artifacts
        run: |
          cd artifacts/win-system
          for f in *.exe; do mv "$f" "${f%.exe}_no-ps7.exe"; done
          for f in *.msi; do mv "$f" "${f%.msi}_no-ps7.msi"; done

      - name: List artifacts
        run: |
          echo "=== Artifacts ==="
          find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.7.11
          name: v1.7.11 正式版 - 校园网自动登录助手
          body: |
            v1.7.11 正式版 - 校园网自动登录助手

            ## 下载说明

            Windows 版本 (内置 PS7 便携版，无需手动安装 PowerShell 7)
            - `xxgcxy-wifi_1.7.11_x64-setup.exe` — NSIS 安装包
            - `xxgcxy-wifi_1.7.11_x64_zh-CN.msi` — MSI 安装包

            Windows 版本 (需系统安装 PS7)
            - `xxgcxy-wifi_1.7.11_x64-setup_no-ps7.exe` — NSIS 安装包
            - `xxgcxy-wifi_1.7.11_x64_zh-CN_no-ps7.msi` — MSI 安装包

            Linux 版本
            - `xxgcxy-wifi_1.7.11_amd64.deb` — Debian/Ubuntu 安装包
            - `xxgcxy-wifi-v1.7.11-x86_64-linux.tar.gz` — 通用 Linux 压缩包（二进制 + 脚本）
            - `xxgcxy-wifi-1.7.11-1.x86_64.rpm` — RPM 包（由 deb 转换，如无法使用请用 deb 包）

            跨平台脚本
            - `xywdl.sh` — 独立 Shell 脚本（Linux/macOS，需安装 pwsh）

            ## 版本说明

            | 版本 | 内置PS7 | 需要系统PS7 |
            |------|---------|-------------|
            | 内置PS7版 | ✅ | ❌ |
            | 系统PS7版 | ❌ | ✅ |
            | Linux版 | N/A | ✅ (pwsh) |

            ## v1.7.11 更新内容
            - 修复: 抗代理干扰 — 所有 HTTP 请求绕过系统代理
            - 修复: 自动重连逻辑增强 — 3 次重试检测 + 重连后重新验证
            - 修复: 登录失败自动重试
            - 新增: 托盘菜单"手动链接"选项
            - 优化: 登录脚本支持 `--non-interactive` 参数（被App调用时静默运行）
            - 新增: Linux TAR.GZ 和 RPM 包

            ## Linux 安装 pwsh

            ```bash
            # Ubuntu/Debian
            wget -q https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb
            sudo dpkg -i packages-microsoft-prod.deb
            sudo apt update && sudo apt install powershell
            ```

            ---
            MIT License | 作者: Thatgfsj
          files: |
            artifacts/win-portable/*.exe
            artifacts/win-portable/*.msi
            artifacts/win-system/*.exe
            artifacts/win-system/*.msi
            artifacts/linux/*.deb
            artifacts/linux/*.tar.gz
            artifacts/linux/*.rpm
            artifacts/standalone-sh/*.sh
