name: Build and Release

on:
  push:
    branches: [main, win-portable, win-system-ps7, linux-sh, linux-support]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend deps
        run: npm ci
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev pkg-config libssl-dev libdbus-1-dev libappindicator3-dev
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Build with Tauri CLI
        run: npx @tauri-apps/cli build
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend deps
        run: npm ci
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build with Tauri CLI
        run: npx @tauri-apps/cli build
      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  build-windows-no-ps7:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/heads/win-system-ps7') || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend deps
        run: npm ci
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Download PowerShell 7 portable
        shell: pwsh
        run: |
          $resp = Invoke-WebRequest -Uri "https://github.com/PowerShell/PowerShell/releases/download/v7.4.6/PowerShell-7.4.6-win-x64.zip" -OutFile "pw7.zip"
          Expand-Archive -Path "pw7.zip" -DestinationPath "." -Force
          Remove-Item "pw7.zip"
          New-Item -ItemType Directory -Path "_pw7_" -Force
          Get-ChildItem -Directory | Where-Object { $_.Name -like "pwsh*" } | Move-Item -Destination "_pw7_"
      - name: Build with Tauri CLI
        run: npx @tauri-apps/cli build
      - name: Upload Windows Artifacts (no PS7)
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle-no-ps7
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  create-release:
    needs: [build, build-windows, build-windows-no-ps7]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/linux-deb/*.deb
            artifacts/windows-bundle/*.exe
            artifacts/windows-bundle/*.msi
            artifacts/windows-bundle-no-ps7/*.exe
            artifacts/windows-bundle-no-ps7/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
